<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Tower Defense 3D</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a1a2e; overflow: hidden; font-family: 'Segoe UI', sans-serif; color: #fff; touch-action: none; }
#canvas { display: block; width: 100vw; height: 100vh; }

/* === SCREENS === */
.screen { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
.screen.hidden { display: none; }

/* === MAIN MENU === */
#main-menu { background: radial-gradient(ellipse at center, #0d1b2a 0%, #0a0a1a 100%); }
#main-menu .logo { font-size: clamp(2rem, 6vw, 4rem); font-weight: 900; letter-spacing: 0.05em; text-transform: uppercase; color: #f5a623; text-shadow: 0 0 40px rgba(245,166,35,0.5); margin-bottom: 0.5rem; }
#main-menu .subtitle { font-size: clamp(0.8rem, 2vw, 1.1rem); color: #8899aa; letter-spacing: 0.2em; text-transform: uppercase; margin-bottom: 3rem; }
.menu-btn { display: block; width: min(300px, 80vw); padding: 1rem 2rem; margin: 0.5rem 0; border: 2px solid #f5a623; background: transparent; color: #f5a623; font-size: 1.1rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; border-radius: 4px; transition: all 0.2s; text-align: center; }
.menu-btn:hover, .menu-btn:active { background: #f5a623; color: #000; transform: scale(1.03); }
.menu-btn.primary { background: #f5a623; color: #000; }

/* === HUD === */
#hud { position: fixed; top: 0; left: 0; right: 0; height: 56px; background: rgba(10,10,26,0.92); border-bottom: 1px solid rgba(245,166,35,0.3); display: flex; align-items: center; padding: 0 12px; gap: 16px; z-index: 50; backdrop-filter: blur(8px); }
#hud.hidden { display: none; }
.hud-stat { display: flex; align-items: center; gap: 6px; font-size: 1rem; font-weight: 700; }
.hud-stat .icon { font-size: 1.2rem; }
.hud-stat .val { color: #f5a623; min-width: 2.5em; }
.hud-spacer { flex: 1; }
.hud-btn { padding: 6px 14px; border-radius: 4px; border: 1.5px solid #f5a623; background: transparent; color: #f5a623; font-size: 0.85rem; font-weight: 700; cursor: pointer; letter-spacing: 0.05em; transition: all 0.15s; }
.hud-btn:hover { background: #f5a623; color: #000; }
.hud-btn.primary { background: #f5a623; color: #000; }
.hud-btn.danger { border-color: #e74c3c; color: #e74c3c; }
.hud-btn.danger:hover { background: #e74c3c; color: #fff; }
#wave-info { font-size: 0.85rem; color: #8899aa; white-space: nowrap; }

/* === BOTTOM PANEL === */
#bottom-panel { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(10,10,26,0.95); border-top: 1px solid rgba(245,166,35,0.3); z-index: 50; backdrop-filter: blur(8px); }
#bottom-panel.hidden { display: none; }
.tab-bar { display: flex; border-bottom: 1px solid rgba(255,255,255,0.1); }
.tab-btn { flex: 1; padding: 10px; text-align: center; font-size: 0.8rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: #556677; cursor: pointer; transition: color 0.2s; }
.tab-btn.active { color: #f5a623; border-bottom: 2px solid #f5a623; }
.tab-content { display: none; padding: 8px 8px 12px; overflow-x: auto; white-space: nowrap; }
.tab-content.active { display: block; }
.item-card { display: inline-flex; flex-direction: column; align-items: center; width: 80px; margin-right: 6px; padding: 8px 4px; background: rgba(255,255,255,0.05); border: 1.5px solid rgba(255,255,255,0.1); border-radius: 8px; cursor: pointer; transition: all 0.2s; vertical-align: top; }
.item-card:hover { border-color: #f5a623; background: rgba(245,166,35,0.1); }
.item-card.selected { border-color: #f5a623; background: rgba(245,166,35,0.15); }
.item-card.disabled { opacity: 0.4; cursor: not-allowed; }
.item-icon { font-size: 2rem; margin-bottom: 4px; }
.item-name { font-size: 0.65rem; font-weight: 700; text-align: center; color: #ccc; margin-bottom: 2px; white-space: normal; line-height: 1.2; }
.item-cost { font-size: 0.7rem; color: #f5a623; }

/* === TOWER INFO PANEL === */
#tower-info { position: fixed; right: 12px; top: 68px; width: 200px; background: rgba(10,10,26,0.95); border: 1px solid rgba(245,166,35,0.4); border-radius: 8px; padding: 12px; z-index: 50; backdrop-filter: blur(8px); }
#tower-info.hidden { display: none; }
#tower-info h3 { font-size: 0.9rem; color: #f5a623; margin-bottom: 8px; }
.ti-stat { display: flex; justify-content: space-between; font-size: 0.75rem; color: #aaa; margin-bottom: 4px; }
.ti-stat span:last-child { color: #fff; }
.ti-btn { width: 100%; padding: 6px; margin-top: 6px; border-radius: 4px; border: 1px solid; font-size: 0.75rem; font-weight: 700; cursor: pointer; transition: all 0.15s; }
.ti-upgrade { border-color: #2ecc71; color: #2ecc71; background: transparent; }
.ti-upgrade:hover { background: #2ecc71; color: #000; }
.ti-sell { border-color: #e74c3c; color: #e74c3c; background: transparent; }
.ti-sell:hover { background: #e74c3c; color: #fff; }

/* === WAVE NOTIFICATION === */
#wave-notify { position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); text-align: center; z-index: 200; pointer-events: none; transition: opacity 0.5s; }
#wave-notify.hidden { opacity: 0; }
#wave-notify .wn-title { font-size: clamp(2rem, 8vw, 4rem); font-weight: 900; color: #f5a623; text-shadow: 0 0 30px rgba(245,166,35,0.8); }
#wave-notify .wn-sub { font-size: 1rem; color: #aaa; }

/* === GAME OVER / WIN === */
#game-over-screen { background: rgba(0,0,0,0.85); }
#game-over-screen h1 { font-size: clamp(2rem, 8vw, 5rem); font-weight: 900; color: #e74c3c; text-shadow: 0 0 40px rgba(231,76,60,0.6); margin-bottom: 1rem; }
#win-screen { background: rgba(0,0,0,0.85); }
#win-screen h1 { font-size: clamp(2rem, 8vw, 5rem); font-weight: 900; color: #2ecc71; text-shadow: 0 0 40px rgba(46,204,113,0.6); margin-bottom: 1rem; }
.result-info { color: #aaa; font-size: 1rem; margin-bottom: 2rem; }

/* === LOADING === */
#loading-screen { background: #0a0a1a; }
#loading-screen .loader-title { font-size: 1.5rem; font-weight: 700; color: #f5a623; margin-bottom: 1.5rem; }
.progress-bar { width: min(400px, 80vw); height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; overflow: hidden; }
.progress-fill { height: 100%; background: #f5a623; border-radius: 3px; transition: width 0.3s; }
.progress-label { font-size: 0.8rem; color: #556677; margin-top: 8px; }

/* === TOOLTIP === */
#tooltip { position: fixed; background: rgba(10,10,26,0.95); border: 1px solid rgba(245,166,35,0.4); border-radius: 6px; padding: 8px 12px; font-size: 0.75rem; z-index: 300; pointer-events: none; max-width: 200px; }
#tooltip.hidden { display: none; }
#tooltip h4 { color: #f5a623; margin-bottom: 4px; }
#tooltip p { color: #aaa; line-height: 1.4; }

/* === RANGE INDICATOR === */
.range-circle { position: absolute; border-radius: 50%; border: 2px dashed rgba(245,166,35,0.5); transform: translate(-50%,-50%); pointer-events: none; }

/* Mobile safe area */
@media (max-width: 768px) {
  #hud { height: 52px; padding: 0 8px; gap: 10px; }
  #tower-info { width: 160px; font-size: 0.8em; }
}
</style>
</head>
<body>

<!-- Loading Screen -->
<div id="loading-screen" class="screen">
  <div class="loader-title">🏰 Loading Tower Defense</div>
  <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>

</div>

<!-- Main Menu -->
<div id="main-menu" class="screen hidden">
  <div class="logo">Tower Defense</div>
  <div class="subtitle">3D Strategy</div>
  <button class="menu-btn primary" id="btn-play">▶ Play</button>
  <button class="menu-btn" id="btn-maps">📋 Select Map</button>

</div>

<!-- HUD -->
<div id="hud" class="hidden">
  <div class="hud-stat"><span class="icon">💰</span><span class="val" id="hud-gold">0</span></div>
  <div class="hud-stat"><span class="icon">❤️</span><span class="val" id="hud-lives">0</span></div>

</div>

<!-- Bottom Panel -->
<div id="bottom-panel" class="hidden">
  <div class="tab-bar">
    <div class="tab-btn active" data-tab="towers">⚔️ Towers</div>

  </div>

<!-- Tower Info -->
<div id="tower-info" class="hidden">
  <h3 id="ti-name">Tower</h3>
  <div class="ti-stat"><span>Level</span><span id="ti-level">1</span></div>
  <div class="ti-stat"><span>Damage</span><span id="ti-damage">0</span></div>
  <div class="ti-stat"><span>Range</span><span id="ti-range">0</span></div>
  <div class="ti-stat"><span>Speed</span><span id="ti-speed">0</span></div>
  <button class="ti-btn ti-upgrade" id="btn-upgrade">Upgrade (💰0)</button>
  <button class="ti-btn ti-sell" id="btn-sell">Sell (💰0)</button>
  <button class="ti-btn" id="btn-deselect" style="border-color:#556677;color:#556677;">Close</button>
</div>

<!-- Wave Notify -->
<div id="wave-notify" class="hidden">
  <div class="wn-title" id="wn-title">Wave 1</div>
  <div class="wn-sub" id="wn-sub">Prepare your defenses!</div>
</div>

<!-- Game Over -->
<div id="game-over-screen" class="screen hidden">
  <h1>💀 Game Over</h1>
  <div class="result-info" id="go-info">Wave: 0</div>
  <button class="menu-btn primary" id="btn-go-retry">Retry</button>
  <button class="menu-btn" id="btn-go-menu">Main Menu</button>
</div>

<!-- Win Screen -->
<div id="win-screen" class="screen hidden">

  <div class="result-info" id="win-info">All waves survived!</div>
  <button class="menu-btn primary" id="btn-win-menu">Main Menu</button>
</div>

<!-- Map Editor (simple overlay) -->
<div id="editor-screen" class="screen hidden" style="background:#0a0a1a;">
  <h2 style="color:#f5a623;margin-bottom:1rem;">Map Editor</h2>
  <p style="color:#aaa;margin-bottom:2rem;">Coming soon! Use the default map to play.</p>
  <button class="menu-btn" id="btn-editor-back">← Back</button>
</div>

<!-- Canvas -->
<canvas id="canvas"></canvas>

<!-- Tooltip -->
<div id="tooltip" class="hidden"><h4 id="tt-name"></h4><p id="tt-desc"></p></div>

<script type="module">
// ============================================================
// TOWER DEFENSE 3D — Full Game
// Uses Three.js r128 CDN + GLTFLoader
// ============================================================

// Dynamically load Three.js
async function loadScript(src) {
  return new Promise((res, rej) => {
    const s = document.createElement('script');
    s.src = src;
    s.onload = res;
    s.onerror = rej;
    document.head.appendChild(s);
  });
}

const BASE = (()=>{
  const l = window.location.href;
  if (l.startsWith('file://')) return './';
  return l.endsWith('/') ? l : l.substring(0, l.lastIndexOf('/')+1);
})();

function updateProgress(pct, label) {
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-label').textContent = label;
}

updateProgress(5, 'Loading Three.js...');
await loadScript('https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js');
updateProgress(15, 'Loading loaders...');

// GLB Loader with external texture support (Kenney colormap.png)
// Pre-loads the shared colormap texture once, then reuses it for all models

const _textureCache = {};
function loadTextureOnce(url) {
  if (_textureCache[url]) return _textureCache[url];
  const tex = new THREE.TextureLoader().load(url);
  tex.flipY = false;
  tex.magFilter = THREE.NearestFilter;
  tex.minFilter = THREE.NearestMipmapLinearFilter;
  tex.encoding = THREE.sRGBEncoding;
  _textureCache[url] = tex;
  return tex;
}

class GLBLoader {
  constructor(manager) { this.manager = manager; }
  
  load(url, onLoad, onProgress, onError) {
    fetch(url)
      .then(r => r.arrayBuffer())
      .then(buf => this._parse(buf, url, onLoad))
      .catch(onError || console.error);
  }

  _parse(buffer, url, onLoad) {
    const magic = new Uint32Array(buffer, 0, 1)[0];
    if (magic !== 0x46546C67) { console.error('Not a GLB file:', url); return; }
    
    let jsonChunk = null, binChunk = null;
    let offset = 12;
    const dv = new DataView(buffer);
    
    while (offset < buffer.byteLength) {
      const chunkLen = dv.getUint32(offset, true);
      const chunkType = dv.getUint32(offset + 4, true);
      offset += 8;
      if (chunkType === 0x4E4F534A) {
        jsonChunk = JSON.parse(new TextDecoder().decode(new Uint8Array(buffer, offset, chunkLen)));
      } else if (chunkType === 0x004E4942) {
        binChunk = buffer.slice(offset, offset + chunkLen);
      }
      offset += chunkLen;
    }
    
    if (!jsonChunk) { console.error('No JSON chunk in GLB'); return; }
    
    // Resolve base URL for external texture references
    const baseUrl = url.substring(0, url.lastIndexOf('/') + 1);
    const scene = this._buildScene(jsonChunk, binChunk, baseUrl);
    onLoad({ scene });
  }

  _buildScene(gltf, binChunk, baseUrl) {
    const group = new THREE.Group();
    
    // Build buffers
    const bufferViews = [];
    if (gltf.bufferViews) {
      for (const bv of gltf.bufferViews) {
        bufferViews.push(new Uint8Array(binChunk, bv.byteOffset || 0, bv.byteLength));
      }
    }

    // Build accessors
    const getAccessorData = (idx) => {
      if (idx === undefined) return null;
      const acc = gltf.accessors[idx];
      const bv = bufferViews[acc.bufferView];
      const compMap = { SCALAR:1, VEC2:2, VEC3:3, VEC4:4, MAT4:16 };
      const n = compMap[acc.type] || 1;
      const byteOffset = acc.byteOffset || 0;
      const sliced = bv.slice(byteOffset);
      if (acc.componentType === 5126) return new Float32Array(sliced.buffer, sliced.byteOffset, acc.count * n);
      if (acc.componentType === 5125) return new Uint32Array(sliced.buffer, sliced.byteOffset, acc.count * n);
      if (acc.componentType === 5123) return new Uint16Array(sliced.buffer, sliced.byteOffset, acc.count * n);
      if (acc.componentType === 5121) return new Uint8Array(sliced.buffer, sliced.byteOffset, acc.count * n);
      return null;
    };

    // Resolve textures - load external URI textures (e.g. Textures/colormap.png)
    const textures = [];
    if (gltf.textures && gltf.images) {
      for (const tex of gltf.textures) {
        const imgDef = gltf.images[tex.source];
        if (imgDef && imgDef.uri) {
          const texUrl = baseUrl + imgDef.uri;
          textures.push(loadTextureOnce(texUrl));
        } else if (imgDef && imgDef.bufferView !== undefined) {
          // Embedded image in binary chunk
          const bv = bufferViews[imgDef.bufferView];
          const blob = new Blob([bv], { type: imgDef.mimeType || 'image/png' });
          const objUrl = URL.createObjectURL(blob);
          const t = new THREE.TextureLoader().load(objUrl);
          t.flipY = false;
          t.encoding = THREE.sRGBEncoding;
          textures.push(t);
        } else {
          textures.push(null);
        }
      }
    }

    // Build materials with texture support
    const materials = [];
    if (gltf.materials) {
      for (const mat of gltf.materials) {
        const m = new THREE.MeshLambertMaterial();
        if (mat.pbrMetallicRoughness) {
          const pbr = mat.pbrMetallicRoughness;
          if (pbr.baseColorTexture !== undefined && textures[pbr.baseColorTexture.index]) {
            m.map = textures[pbr.baseColorTexture.index];
          }
          if (pbr.baseColorFactor) {
            const [r,g,b,a] = pbr.baseColorFactor;
            m.color.setRGB(r,g,b);
            if (a < 1) { m.transparent = true; m.opacity = a; }
          }
        }
        if (mat.doubleSided) m.side = THREE.DoubleSide;
        materials.push(m);
      }
    }

    // Build meshes
    const buildMesh = (meshIdx) => {
      const mesh = gltf.meshes[meshIdx];
      const group = new THREE.Group();
      for (const prim of mesh.primitives) {
        const geo = new THREE.BufferGeometry();
        const attrs = prim.attributes;
        if (attrs.POSITION !== undefined) {
          const pos = getAccessorData(attrs.POSITION);
          if (pos) geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
        }
        if (attrs.NORMAL !== undefined) {
          const nor = getAccessorData(attrs.NORMAL);
          if (nor) geo.setAttribute('normal', new THREE.BufferAttribute(nor, 3));
        }
        if (attrs.TEXCOORD_0 !== undefined) {
          const uv = getAccessorData(attrs.TEXCOORD_0);
          if (uv) geo.setAttribute('uv', new THREE.BufferAttribute(uv, 2));
        }
        if (prim.indices !== undefined) {
          const idx = getAccessorData(prim.indices);
          if (idx) geo.setIndex(new THREE.BufferAttribute(idx, 1));
        }
        if (!geo.attributes.normal) geo.computeVertexNormals();
        const mat = (prim.material !== undefined && materials[prim.material]) 
          ? materials[prim.material] 
          : new THREE.MeshLambertMaterial({ color: 0x88aa88 });
        group.add(new THREE.Mesh(geo, mat));
      }
      return group;
    };

    // Build nodes
    const buildNode = (nodeIdx) => {
      const node = gltf.nodes[nodeIdx];
      const obj = new THREE.Group();
      obj.name = node.name || '';
      if (node.translation) obj.position.fromArray(node.translation);
      if (node.rotation) obj.quaternion.fromArray(node.rotation);
      if (node.scale) obj.scale.fromArray(node.scale);
      if (node.matrix) {
        const m = new THREE.Matrix4();
        m.fromArray(node.matrix);
        obj.applyMatrix4(m);
      }
      if (node.mesh !== undefined) obj.add(buildMesh(node.mesh));
      if (node.children) node.children.forEach(c => obj.add(buildNode(c)));
      return obj;
    };

    // Build scene
    if (gltf.scene !== undefined && gltf.scenes) {
      const sc = gltf.scenes[gltf.scene];
      if (sc.nodes) sc.nodes.forEach(n => group.add(buildNode(n)));
    } else if (gltf.nodes) {
      gltf.nodes.forEach((_, i) => group.add(buildNode(i)));
    }

    return group;
  }
}

// ============================================================
// ASSET MANAGER
// ============================================================
class AssetManager {
  constructor() {
    this.models = {};
    this.loader = new GLBLoader();
    this.total = 0;
    this.loaded = 0;
  }

  async loadAll(assets) {
    this.total = Object.keys(assets).length;
    const promises = Object.entries(assets).map(([key, path]) =>
      new Promise((res) => {
        this.loader.load(
          BASE + path,
          (gltf) => {
            this.models[key] = gltf.scene;
            this.loaded++;
            const pct = 15 + Math.round((this.loaded / this.total) * 70);
            updateProgress(pct, `Loading ${key}...`);
            res();
          },
          undefined,
          (err) => {
            console.warn(`Failed to load ${key}:`, err);
            this.models[key] = null;
            this.loaded++;
            res();
          }
        );
      })
    );
    await Promise.all(promises);
  }

  clone(key) {
    if (!this.models[key]) return null;
    return this.models[key].clone(true);
  }
}

// ============================================================
// GAME CONSTANTS
// ============================================================
const TILE_SIZE = 1;
const GRID_W = 20;
const GRID_H = 20;

const TILE_GRASS = 0;
const TILE_ROAD = 1;
const TILE_WATER = 2;
const TILE_BRIDGE = 3;
const TILE_TREE = 4;
const TILE_ROCK = 5;
const TILE_START = 6;
const TILE_END = 7;

// Default map layout (20x20)
const DEFAULT_MAP = (() => {
  const g = Array.from({length:GRID_H}, () => Array(GRID_W).fill(TILE_GRASS));
  
  // Winding S-shaped path
  const path = [
    // Horizontal top segment left→right
    [1,1],[1,2],[1,3],[1,4],[1,5],[1,6],[1,7],[1,8],[1,9],
    // Turn down
    [2,9],[3,9],[4,9],[5,9],
    // Horizontal middle right→left
    [5,8],[5,7],[5,6],[5,5],[5,4],[5,3],[5,2],[5,1],
    // Turn down
    [6,1],[7,1],[8,1],[9,1],
    // Horizontal lower left→right
    [9,2],[9,3],[9,4],[9,5],[9,6],[9,7],[9,8],[9,9],[9,10],[9,11],[9,12],
    // Turn down
    [10,12],[11,12],[12,12],[13,12],
    // Horizontal bottom right→left
    [13,11],[13,10],[13,9],[13,8],[13,7],[13,6],[13,5],[13,4],[13,3],
    // Turn down
    [14,3],[15,3],[16,3],
    // Final horizontal left→right
    [16,4],[16,5],[16,6],[16,7],[16,8],[16,9],[16,10],[16,11],[16,12],[16,13],[16,14],[16,15],[16,16],[16,17],[16,18],
  ];
  path.forEach(([r,c]) => g[r][c] = TILE_ROAD);
  g[1][1] = TILE_START;
  g[16][18] = TILE_END;

  // Dense tree clusters (natural forest areas)
  const treeCells = [
    [1,12],[1,13],[1,14],[1,15],[1,16],[1,17],[1,18],
    [2,12],[2,13],[2,15],[2,17],[2,18],
    [3,12],[3,13],[3,14],[3,17],[3,18],
    [3,1],[3,2],[3,3],[3,4],[3,5],[3,6],
    [4,1],[4,2],[4,4],[4,6],
    [7,3],[7,4],[7,5],[7,6],[7,7],[7,8],[7,9],[7,10],[7,11],[7,12],
    [8,3],[8,5],[8,7],[8,9],[8,11],
    [10,1],[10,2],[11,1],[11,2],[12,1],[12,2],
    [11,5],[11,6],[11,7],[12,5],[12,6],
    [14,6],[14,7],[14,8],[14,9],[15,6],[15,7],[15,9],
    [14,13],[14,14],[14,15],[14,16],[14,17],[14,18],
    [15,13],[15,14],[15,16],[15,17],[15,18],
    [17,1],[17,2],[18,1],[18,2],[18,3],
    [18,5],[18,6],[18,7],[18,8],[18,9],[18,10],
    [18,13],[18,14],[18,15],[18,16],[18,17],[18,18],
    [17,16],[17,17],[17,18],
  ];
  treeCells.forEach(([r,c]) => { if(g[r][c]===TILE_GRASS) g[r][c]=TILE_TREE; });
  
  // Rock formations
  [[3,7],[3,8],[4,7],[4,8]].forEach(([r,c]) => { if(g[r][c]===TILE_GRASS) g[r][c]=TILE_ROCK; });

  [[6,14],[7,14],[6,15]].forEach(([r,c]) => { if(g[r][c]===TILE_GRASS) g[r][c]=TILE_ROCK; });

  return g;
})();

// Pre-computed path from start to end using BFS
function computePath(grid) {
  let start = null, end = null;
  for (let r = 0; r < GRID_H; r++)
    for (let c = 0; c < GRID_W; c++) {
      if (grid[r][c] === TILE_START) start = [r,c];
      if (grid[r][c] === TILE_END) end = [r,c];
    }
  if (!start || !end) return [];
  
  const queue = [[...start, []]];
  const visited = new Set();
  const key = (r,c) => r+','+c;
  visited.add(key(...start));
  const walkable = [TILE_ROAD, TILE_BRIDGE, TILE_START, TILE_END];
  
  while (queue.length) {
    const [r,c,path] = queue.shift();
    const newPath = [...path, [r,c]];
    if (r === end[0] && c === end[1]) return newPath;
    for (const [dr,dc] of [[-1,0],[1,0],[0,-1],[0,1]]) {
      const nr = r+dr, nc = c+dc;
      if (nr<0||nr>=GRID_H||nc<0||nc>=GRID_W) continue;
      if (visited.has(key(nr,nc))) continue;
      if (!walkable.includes(grid[nr][nc])) continue;
      visited.add(key(nr,nc));
      queue.push([nr, nc, newPath]);
    }
  }
  return [];
}

function buildWave(waveNum) {
  const enemies = [];
  const isBossWave = waveNum % 5 === 0;
  const count = 5 + waveNum * 3;
  const hpMult = 1 + (waveNum - 1) * 0.3;
  const spawnInterval = Math.max(0.3, 1.5 - waveNum * 0.05);
  
  if (isBossWave) {
    enemies.push({ type:'boss', hpMult: hpMult * 2 });
  }
  
  const types = ['worker','runner','fatguy','police','engineer'];
  for (let i = 0; i < count; i++) {
    const t = types[Math.floor(Math.random() * Math.min(waveNum, types.length))];
    enemies.push({ type: t, hpMult });
  }
  
  return { enemies, spawnInterval, num: waveNum };
}

  camera.lookAt(camTarget);
}

// Determines the correct road tile model and rotation based on neighbors
function getRoadTileInfo(g, r, c) {
  const walkable = [TILE_ROAD, TILE_BRIDGE, TILE_START, TILE_END];
  const hasN = r > 0 && walkable.includes(g[r-1][c]);
  const hasS = r < GRID_H-1 && walkable.includes(g[r+1][c]);
  const hasW = c > 0 && walkable.includes(g[r][c-1]);
  const hasE = c < GRID_W-1 && walkable.includes(g[r][c+1]);
  const count = (hasN?1:0)+(hasS?1:0)+(hasW?1:0)+(hasE?1:0);

  // Straight NS
  if (hasN && hasS && !hasW && !hasE) return { model:'tile_straight', rot: 0 };
  // Straight EW
  if (hasW && hasE && !hasN && !hasS) return { model:'tile_straight', rot: Math.PI/2 };
  // Corner turns
  if (hasS && hasE && !hasN && !hasW) return { model:'tile_corner_round', rot: 0 };
  if (hasS && hasW && !hasN && !hasE) return { model:'tile_corner_round', rot: Math.PI/2 };
  if (hasN && hasE && !hasS && !hasW) return { model:'tile_corner_round', rot: -Math.PI/2 };
  if (hasN && hasW && !hasS && !hasE) return { model:'tile_corner_round', rot: Math.PI };
  // T intersections → crossing
  if (count >= 3) return { model:'tile_crossing', rot: 0 };
  // End caps
  if (hasN && !hasS && !hasW && !hasE) return { model:'tile_straight', rot: 0 };
  if (hasS && !hasN && !hasW && !hasE) return { model:'tile_straight', rot: 0 };
  if (hasE && !hasW && !hasN && !hasS) return { model:'tile_straight', rot: Math.PI/2 };
  if (hasW && !hasE && !hasN && !hasS) return { model:'tile_straight', rot: Math.PI/2 };
  return { model:'tile_straight', rot: 0 };
}

function buildMap(g) {
  // Clear existing
  tileObjects.forEach(o => scene.remove(o));
  tileObjects = [];
  tileMeshGrid = Array.from({length:GRID_H}, () => Array(GRID_W).fill(null));

  // Large green base plate
  const plateGeo = new THREE.BoxGeometry(GRID_W * TILE_SIZE + 2, 0.3, GRID_H * TILE_SIZE + 2);
  const plateMat = new THREE.MeshLambertMaterial({ color: 0x5a9a3e });
  const plate = new THREE.Mesh(plateGeo, plateMat);
  plate.position.set((GRID_W-1)/2 * TILE_SIZE, -0.18, (GRID_H-1)/2 * TILE_SIZE);
  plate.receiveShadow = true;
  scene.add(plate);
  tileObjects.push(plate);

  for (let r = 0; r < GRID_H; r++) {
    for (let c = 0; c < GRID_W; c++) {
      const tileType = g[r][c];
      let modelKey = 'tile';
      let rotY = 0;

      if (tileType === TILE_START) {
        modelKey = 'tile_spawn_round'; rotY = 0;
      } else if (tileType === TILE_END) {
        modelKey = 'tile_end_round'; rotY = 0;
      } else if (tileType === TILE_ROAD) {
        const info = getRoadTileInfo(g, r, c);
        modelKey = info.model; rotY = info.rot;
      } else if (tileType === TILE_TREE) {
        // Randomly pick tree variety
        const trees = ['tile_tree','tile_tree_double','tile_tree'];
        modelKey = trees[(r*7+c*3) % trees.length];
      } else if (tileType === TILE_ROCK) {
        modelKey = 'tile_rock';
      } else if (tileType === TILE_WATER) {
        modelKey = 'tile_river_straight';
        // Determine orientation
        const hasN = r>0 && g[r-1][c]===TILE_WATER;
        const hasS = r<GRID_H-1 && g[r+1][c]===TILE_WATER;
        rotY = (hasN||hasS) ? 0 : Math.PI/2;
      } else if (tileType === TILE_BRIDGE) {
        modelKey = 'tile_river_bridge';
        const hasN = r>0 && [TILE_ROAD,TILE_BRIDGE,TILE_START,TILE_END].includes(g[r-1][c]);
        const hasS = r<GRID_H-1 && [TILE_ROAD,TILE_BRIDGE,TILE_START,TILE_END].includes(g[r+1][c]);
        rotY = (hasN||hasS) ? 0 : Math.PI/2;
      } else {
        modelKey = 'tile';
        // Random slight rotation variety for natural look
        const variants = [0, Math.PI/2, Math.PI, -Math.PI/2];
        rotY = variants[(r*3+c*7) % 4];
      }
      
      let obj = assets.clone(modelKey);
      if (!obj) {
        // Fallback colored geometry
        const geo = new THREE.BoxGeometry(TILE_SIZE*0.97, 0.18, TILE_SIZE*0.97);
        const colorMap = {
          [TILE_GRASS]: 0x5db35d, [TILE_ROAD]: 0xc8a46e, [TILE_WATER]: 0x4a90d9,
          [TILE_BRIDGE]: 0xb8904e, [TILE_TREE]: 0x2d6e2d, [TILE_ROCK]: 0x888888,
          [TILE_START]: 0xffcc00, [TILE_END]: 0xff4444,
        };
        obj = new THREE.Mesh(geo, new THREE.MeshLambertMaterial({ color: colorMap[tileType] || 0x5db35d }));
      }

      // Scale to fit exactly one grid cell
      const box = new THREE.Box3().setFromObject(obj);
      const sz = new THREE.Vector3();
      box.getSize(sz);
      const maxDim = Math.max(sz.x, sz.z);
      if (maxDim > 0.01) {
        const s = TILE_SIZE / maxDim;
        obj.scale.set(s, s, s);
      }

      obj.rotation.y = rotY;
      obj.position.set(c * TILE_SIZE, 0, r * TILE_SIZE);
      obj.traverse(m => { if (m.isMesh) { m.castShadow = true; m.receiveShadow = true; } });
      obj.userData = { type:'tile', row:r, col:c, tileType };
      
      scene.add(obj);
      tileObjects.push(obj);
      tileMeshGrid[r][c] = obj;
    }
  }
  
  // Center camera
  camTarget.set((GRID_W-1)/2 * TILE_SIZE, 0, (GRID_H-1)/2 * TILE_SIZE);
  updateCamera();
}

function placeTower(row, col, def) {
  if (gold < def.cost) return false;
  if (grid[row][col] !== TILE_GRASS) return false;
  if (towers.find(t => t.row===row && t.col===col)) return false;
  
  gold -= def.cost;
  updateHUD();
  
  const tower = {
    id: Date.now() + Math.random(),
    row, col, def,
    level: 1,
    damage: def.damage,
    range: def.range,
    attackSpeed: def.attackSpeed,
    cooldown: 0,
    totalSpent: def.cost,
    special: def.special || null,
  };
  towers.push(tower);
  
  // 3D model
  let model = assets.clone(def.modelKey);
  if (!model) {
    const geo = new THREE.CylinderGeometry(0.25, 0.3, 0.7, 8);
    const mat = new THREE.MeshLambertMaterial({ color: def.color || 0x888888 });
    model = new THREE.Mesh(geo, mat);
  }
  
  // Scale
  const box = new THREE.Box3().setFromObject(model);
  const sz = new THREE.Vector3();
  box.getSize(sz);
  const maxDim = Math.max(sz.x, sz.y, sz.z);
  if (maxDim > 0) {
    const s = 0.7 / maxDim;
    model.scale.set(s, s, s);
  }
  
  model.position.set(col * TILE_SIZE, 0.15, row * TILE_SIZE);
  model.traverse(m => { if(m.isMesh) { m.castShadow=true; } });
  model.userData = { towerId: tower.id };
  scene.add(model);
  towerMeshes[tower.id] = model;
  
  return true;
}

function upgradeTower(tower) {
  if (tower.level >= 4) return false;
  const upg = UPGRADE_MULT[tower.level - 1];
  const cost = Math.floor(tower.def.cost * upg.cost);
  if (gold < cost) return false;
  
  gold -= cost;
  tower.totalSpent += cost;
  tower.damage = Math.floor(tower.def.damage * upg.damage);
  tower.range = tower.def.range * upg.range;
  tower.attackSpeed = tower.def.attackSpeed * upg.attackSpeed;
  tower.level++;
  
  // Visual upgrade indicator
  const mesh = towerMeshes[tower.id];
  if (mesh) {
    mesh.scale.multiplyScalar(1.1);
    // Flash
    mesh.traverse(m => {
      if (m.isMesh && m.material) {
        const orig = m.material.emissive ? m.material.emissive.clone() : new THREE.Color(0);
        if (m.material.emissive) m.material.emissive.set(0xffff00);
        setTimeout(() => { if(m.material.emissive) m.material.emissive.copy(orig); }, 300);
      }
    });
  }
  
  updateHUD();
  showTowerInfo(tower);
  return true;
}

function sellTower(tower) {
  const idx = towers.indexOf(tower);
  if (idx === -1) return;
  
  gold += Math.floor(tower.totalSpent * 0.6);
  towers.splice(idx, 1);
  
  const mesh = towerMeshes[tower.id];
  if (mesh) { scene.remove(mesh); delete towerMeshes[tower.id]; }
  
  hideTowerInfo();
  updateHUD();
}

function spawnEnemy(typeId, hpMult) {
  const def = ENEMY_DEFS.find(e => e.id === typeId) || ENEMY_DEFS[0];
  
  let model = assets.clone(def.modelKey);
  if (!model) {
    const geo = new THREE.SphereGeometry(0.25, 8, 6);
    const mat = new THREE.MeshLambertMaterial({ color: def.color });
    model = new THREE.Mesh(geo, mat);
  }
  
  const box = new THREE.Box3().setFromObject(model);
  const sz = new THREE.Vector3();
  box.getSize(sz);
  const maxDim = Math.max(sz.x, sz.y, sz.z);
  const s = (def.scale || 0.4) / maxDim;
  model.scale.set(s, s, s);
  
  // Start position
  const startCell = path[0];
  model.position.set(startCell[1] * TILE_SIZE, 0.3, startCell[0] * TILE_SIZE);
  model.traverse(m => { if(m.isMesh) m.castShadow = true; });
  scene.add(model);
  
  // Health bar (sprite)
  const hbCanvas = document.createElement('canvas');
  hbCanvas.width = 64; hbCanvas.height = 8;
  const hbCtx = hbCanvas.getContext('2d');
  const hbTex = new THREE.CanvasTexture(hbCanvas);
  const hbMat = new THREE.SpriteMaterial({ map: hbTex, depthTest: false });
  const hbSprite = new THREE.Sprite(hbMat);
  hbSprite.scale.set(0.8, 0.1, 1);
  hbSprite.position.set(0, 0.6, 0);
  model.add(hbSprite);
  
  const maxHp = def.hp * hpMult;
  const enemy = {
    id: ++enemyId,
    def, model, hbCanvas, hbCtx, hbTex, hbSprite,
    hp: maxHp, maxHp,
    speed: def.speed,
    pathIdx: 0,
    dead: false,
    reached: false,
    slowTimer: 0,
    poisonTimer: 0,
    poisonDmg: 0,
    stunTimer: 0,
  };
  
  enemies.push(enemy);
  updateHealthBar(enemy);
  return enemy;
}

function updateHealthBar(enemy) {
  const pct = Math.max(0, enemy.hp / enemy.maxHp);
  const ctx = enemy.hbCtx;
  ctx.clearRect(0, 0, 64, 8);
  ctx.fillStyle = '#333';
  ctx.fillRect(0, 0, 64, 8);
  ctx.fillStyle = pct > 0.5 ? '#2ecc71' : pct > 0.25 ? '#f39c12' : '#e74c3c';
  ctx.fillRect(1, 1, Math.floor(pct * 62), 6);
  enemy.hbTex.needsUpdate = true;
}

function damageEnemy(enemy, dmg, effect) {
  if (enemy.dead) return;
  enemy.hp -= dmg;
  updateHealthBar(enemy);
  
  if (effect === 'slow') enemy.slowTimer = Math.max(enemy.slowTimer, 2);
  if (effect === 'freeze') enemy.slowTimer = Math.max(enemy.slowTimer, 3);
  if (effect === 'poison') { enemy.poisonTimer = 5; enemy.poisonDmg = dmg * 0.1; }
  if (effect === 'stun') enemy.stunTimer = Math.max(enemy.stunTimer, 1.5);
  
  spawnHitParticle(enemy.model.position.clone(), dmg);
  
  if (enemy.hp <= 0) killEnemy(enemy);
}

function killEnemy(enemy) {
  if (enemy.dead) return;
  enemy.dead = true;
  gold += enemy.def.reward;
  updateHUD();
  spawnDeathParticles(enemy.model.position.clone());
  scene.remove(enemy.model);
}

// ============================================================
// GAME LOOP
// ============================================================
let lastTime = 0;
let rangeRing = null;

function gameLoop(ts) {
  animFrameId = requestAnimationFrame(gameLoop);
  
  const dt = Math.min((ts - lastTime) / 1000, 0.1) * gameSpeed;
  lastTime = ts;
  
  if (gameState !== 'playing') {
    renderer.render(scene, camera);
    return;
  }
  
  updateEnemies(dt);
  updateTowers(dt);
  updateProjectiles(dt);
  updateParticles(dt);
  updateWaveSpawner(dt);
  checkWaveComplete();
  
  renderer.render(scene, camera);
}

function updateEnemies(dt) {
  for (const enemy of enemies) {
    if (enemy.dead || enemy.reached) continue;
    
    if (enemy.stunTimer > 0) { enemy.stunTimer -= dt; continue; }
    
    // Status effects
    if (enemy.poisonTimer > 0) {
      enemy.poisonTimer -= dt;
      damageEnemy(enemy, enemy.poisonDmg * dt, null);
    }
    
    const speed = enemy.slowTimer > 0 ? enemy.speed * 0.4 : enemy.speed;
    if (enemy.slowTimer > 0) enemy.slowTimer -= dt;
    
    // Move along path
    if (enemy.pathIdx >= path.length - 1) {
      // Reached end
      enemy.reached = true;
      lives--;
      updateHUD();
      scene.remove(enemy.model);
      if (lives <= 0) triggerGameOver();
      continue;
    }
    
    const nextCell = path[enemy.pathIdx + 1];
    const target = new THREE.Vector3(nextCell[1] * TILE_SIZE, 0.3, nextCell[0] * TILE_SIZE);
    const dir = target.clone().sub(enemy.model.position);
    const dist = dir.length();
    
    if (dist < 0.05) {
      enemy.pathIdx++;
    } else {
      dir.normalize();
      enemy.model.position.add(dir.multiplyScalar(speed * dt));
      enemy.model.rotation.y = Math.atan2(dir.x, dir.z);
    }
  }
  
  // Clean dead/reached
  enemies = enemies.filter(e => !e.dead && !e.reached);
}

function updateTowers(dt) {
  for (const tower of towers) {
    tower.cooldown = Math.max(0, tower.cooldown - dt);
    if (tower.cooldown > 0) continue;
    
    // Find target
    const tPos = new THREE.Vector3(tower.col * TILE_SIZE, 0, tower.row * TILE_SIZE);
    let best = null, bestPathIdx = -1;
    
    for (const enemy of enemies) {
      if (enemy.dead || enemy.reached) continue;
      const dist = tPos.distanceTo(enemy.model.position);
      if (dist > tower.range) continue;
      if (enemy.pathIdx > bestPathIdx) { best = enemy; bestPathIdx = enemy.pathIdx; }
    }
    
    if (!best) continue;
    
    tower.cooldown = 1 / tower.attackSpeed;
    
    // Special: lightning chains
    if (tower.def.id === 'lightning') {
      const nearby = enemies.filter(e => !e.dead && !e.reached &&
        tPos.distanceTo(e.model.position) <= tower.range);
      const targets = nearby.slice(0, 3);
      targets.forEach(t => damageEnemy(t, tower.damage, null));
      // Visual lightning effect
      if (targets.length > 0) spawnHitParticle(targets[0].model.position.clone(), tower.damage);
    } else {
      const effect = tower.def.id === 'freeze' ? 'freeze' : 
                     (tower.special || null);
      fireProjectile(tower, best);
    }
    
    // Rotate tower toward enemy
    const mesh = towerMeshes[tower.id];
    if (mesh) {
      const dir = best.model.position.clone().sub(mesh.position);
      mesh.rotation.y = Math.atan2(dir.x, dir.z);
    }
  }
}

function updateProjectiles(dt) {
  for (const proj of projectiles) {
    if (proj.dead) continue;
    
    const enemy = enemies.find(e => e.id === proj.targetId && !e.dead && !e.reached);
    if (!enemy) {
      proj.dead = true;
      scene.remove(proj.mesh);
      continue;
    }
    
    const dir = enemy.model.position.clone().sub(proj.mesh.position);
    const dist = dir.length();
    
    if (dist < 0.2) {
      const effect = proj.tower.def.id === 'freeze' ? 'freeze' :
                     proj.tower.def.id === 'cannon' ? null : 
                     (proj.tower.special || null);
      
      // Splash for cannon
      if (proj.tower.def.id === 'cannon') {
        for (const e of enemies) {
          if (e.dead || e.reached) continue;
          if (enemy.model.position.distanceTo(e.model.position) < 1.2) {
            damageEnemy(e, proj.damage * 0.5, null);
          }
        }
        damageEnemy(enemy, proj.damage, null);
      } else {
        damageEnemy(enemy, proj.damage, effect);
      }
      
      proj.dead = true;
      scene.remove(proj.mesh);
    } else {
      dir.normalize();
      proj.mesh.position.add(dir.multiplyScalar(proj.speed * dt));
    }
  }
  
  projectiles = projectiles.filter(p => !p.dead);
}

function updateParticles(dt) {
  for (const p of particles) {
    p.life -= dt;
    if (p.life <= 0) {
      scene.remove(p.mesh);
      continue;
    }
    p.vel.y -= 9.8 * dt;
    p.mesh.position.add(p.vel.clone().multiplyScalar(dt));
    const a = p.life / p.maxLife;
    if (p.mesh.material) p.mesh.material.opacity = a;
  }
  particles = particles.filter(p => p.life > 0);
}

function updateWaveSpawner(dt) {
  if (!waveActive || spawnQueue.length === 0) return;
  
  spawnTimer -= dt;
  if (spawnTimer <= 0 && spawnQueue.length > 0) {
    const next = spawnQueue.shift();
    spawnEnemy(next.type, next.hpMult);
    spawnTimer = next.interval || 1;
  }
}

function checkWaveComplete() {
  if (!waveActive) return;
  if (spawnQueue.length > 0) return;
  if (enemies.some(e => !e.dead && !e.reached)) return;
  
  waveActive = false;
  document.getElementById('btn-start-wave').textContent = 'Start Wave';
  document.getElementById('btn-start-wave').classList.add('primary');
  
  if (wave >= TOTAL_WAVES) {
    triggerVictory();
  } else {
    showWaveNotify(`Wave ${wave} Complete!`, `Prepare for Wave ${wave + 1}`);
    // Bonus gold
    gold += 50 + wave * 10;
    updateHUD();
  }
}

  wave++;
  waveActive = true;
  
  const waveDef = buildWave(wave);
  const si = waveDef.spawnInterval;
  
  spawnQueue = waveDef.enemies.map(e => ({ ...e, interval: si }));
  spawnTimer = 0;
  
  document.getElementById('btn-start-wave').textContent = 'Wave Active';
  document.getElementById('btn-start-wave').classList.remove('primary');
  
  const isBoss = wave % 5 === 0;
  showWaveNotify(`Wave ${wave}${isBoss ? ' 👹 BOSS' : ''}!`, isBoss ? 'Boss incoming!' : 'Defend your base!');
  
  updateHUD();
}

function onCanvasClick(e) {
  if (gameState !== 'playing') return;
  
  const mouse = new THREE.Vector2(
    (e.clientX / window.innerWidth) * 2 - 1,
    -(e.clientY / window.innerHeight) * 2 + 1
  );
  
  raycaster.setFromCamera(mouse, camera);
  
  // Check tile hits
  const tileMeshes = tileObjects.filter(o => o.userData.type === 'tile');
  const intersects = raycaster.intersectObjects(tileMeshes, true);
  
  let hitTile = null;
  for (const hit of intersects) {
    let obj = hit.object;
    while (obj && !obj.userData.type) obj = obj.parent;
    if (obj && obj.userData.type === 'tile') { hitTile = obj; break; }
  }
  
  if (hitTile) {
    const { row, col, tileType } = hitTile.userData;
    
    if (selectedTowerType && tileType === TILE_GRASS) {
      placeTower(row, col, selectedTowerType);
      return;
    }
    
    // Check tower click
    const towerHit = towers.find(t => t.row === row && t.col === col);
    if (towerHit) {
      showTowerInfo(towerHit);
      return;
    }
  }
  
  // Check tower model click
  const allMeshes = Object.values(towerMeshes);
  const towerIntersects = raycaster.intersectObjects(allMeshes, true);
  if (towerIntersects.length > 0) {
    let obj = towerIntersects[0].object;
    while (obj && !obj.userData.towerId) obj = obj.parent;
    if (obj) {
      const t = towers.find(t => t.id === obj.userData.towerId);
      if (t) { showTowerInfo(t); return; }
    }
  }
  
  deselectAll();
}

// Mouse move for hover range preview
function onMouseMove(e) {
  if (gameState !== 'playing' || !selectedTowerType) { hideHoverRange(); return; }
  
  const mouse = new THREE.Vector2(
    (e.clientX / window.innerWidth) * 2 - 1,
    -(e.clientY / window.innerHeight) * 2 + 1
  );
  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObjects(tileObjects.filter(o => o.userData.type === 'tile'), true);
  
  for (const hit of intersects) {
    let obj = hit.object;
    while (obj && !obj.userData.type) obj = obj.parent;
    if (obj && obj.userData.tileType === TILE_GRASS) {
      showHoverRange(obj.userData.row, obj.userData.col, selectedTowerType);
      return;
    }
  }
  hideHoverRange();
}

// Camera drag
let pointers = {};
let isMoving = false;

function onPointerDown(e) {
  pointers[e.pointerId] = { x: e.clientX, y: e.clientY };
  
  if (Object.keys(pointers).length === 1) {
    isDragging = false;
    dragStart = { x: e.clientX, y: e.clientY };
    isMoving = false;
  }
}

function onPointerMove(e) {
  if (!pointers[e.pointerId]) return;
  
  const keys = Object.keys(pointers);
  
  if (keys.length === 2) {
    // Pinch zoom
    const [p1, p2] = keys.map(k => pointers[k]);
    const newP = { x: e.clientX, y: e.clientY };
    const id = parseInt(e.pointerId);
    
    const otherKey = keys.find(k => parseInt(k) !== id);
    const other = pointers[otherKey];
    const cur = newP;
    
    const newDist = Math.hypot(cur.x - other.x, cur.y - other.y);
    const oldDist = Math.hypot(pointers[e.pointerId].x - other.x, pointers[e.pointerId].y - other.y);
    
    if (lastPinchDist > 0) {
      const delta = (oldDist - newDist) * 0.02;
      camDist = Math.max(5, Math.min(35, camDist + delta));
      updateCamera();
    }
    lastPinchDist = newDist;
    pointers[e.pointerId] = { x: e.clientX, y: e.clientY };
    return;
  }
  
  const dx = e.clientX - pointers[e.pointerId].x;
  const dy = e.clientY - pointers[e.pointerId].y;
  
  if (Math.abs(dx) + Math.abs(dy) > 5) isMoving = true;
  
  if (isMoving) {
    camAngle -= dx * 0.005;
    camElevation = Math.max(0.15, Math.min(1.3, camElevation + dy * 0.005));
    updateCamera();
  }
  
  pointers[e.pointerId] = { x: e.clientX, y: e.clientY };
}

function onPointerUp(e) {
  if (!isMoving && Object.keys(pointers).length === 1) {
    onCanvasClick(e);
  }
  delete pointers[e.pointerId];
  lastPinchDist = 0;
}

function onWheel(e) {
  camDist = Math.max(5, Math.min(35, camDist + e.deltaY * 0.02));
  updateCamera();
}

function startGame(mapGrid) {
  grid = mapGrid.map(r => [...r]);
  path = computePath(grid);
  
  // Reset state
  towers.forEach(t => { if(towerMeshes[t.id]) scene.remove(towerMeshes[t.id]); });
  towers = [];
  towerMeshes = {};
  enemies.forEach(e => scene.remove(e.model));
  enemies = [];
  projectiles.forEach(p => scene.remove(p.mesh));
  projectiles = [];
  particles.forEach(p => scene.remove(p.mesh));
  particles = [];
  spawnQueue = [];
  gold = 300;
  lives = 20;
  wave = 0;
  waveActive = false;
  gameSpeed = 1;
  selectedTowerType = null;
  selectedTower = null;
  
  // Build 3D map
  buildMap(grid);
  
  // Show game UI
  document.getElementById('main-menu').classList.add('hidden');
  document.getElementById('hud').classList.remove('hidden');
  document.getElementById('bottom-panel').classList.remove('hidden');
  document.getElementById('game-over-screen').classList.add('hidden');
  document.getElementById('win-screen').classList.add('hidden');
  
  buildBottomPanel();
  updateHUD();
  
  gameState = 'playing';
  updateCamera();
}
